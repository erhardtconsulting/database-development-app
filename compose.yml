services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ticket_system
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_user
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ticket_system
      SPRING_DATASOURCE_USERNAME: ticket_user
      SPRING_DATASOURCE_PASSWORD: ticket_user
    ports:
      - "8080:8080"

